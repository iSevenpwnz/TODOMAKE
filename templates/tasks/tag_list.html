{% extends 'tasks/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
	<h1><i class="fas fa-tags me-3"></i>Tags</h1>
	<a href="{% url 'tag-create' %}" class="btn btn-primary">
		<i class="fas fa-plus me-2"></i>Add tag
	</a>
</div>

<div class="card">
	<div class="card-body">
		<div class="table-responsive">
			<table class="table table-hover">
				<thead>
				<tr>
					<th>Name</th>
					<th class="text-end">Actions</th>
				</tr>
				</thead>
				<tbody>
				{% for tag in tags %}
				<tr>
					<td>
						<i class="fas fa-tag me-2"></i>
						{{ tag.name }}
					</td>
					<td class="text-end">
						<div class="btn-group">
							<a href="{% url 'tag-update' tag.pk %}" class="btn btn-primary btn-sm">
								<i class="fas fa-edit me-1"></i>Update
							</a>
							<a href="{% url 'tag-delete' tag.pk %}" class="btn btn-danger btn-sm">
								<i class="fas fa-trash me-1"></i>Delete
							</a>
						</div>
					</td>
				</tr>
				{% empty %}
				<tr>
					<td colspan="2" class="text-center">
						<i class="fas fa-info-circle me-2"></i>No tags yet.
					</td>
				</tr>
				{% endfor %}
				</tbody>
			</table>
		</div>
	</div>
</div>
{% endblock %}
